name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # mediapipe/opencv need the system GL libs to even import, not just to
      # show a window -- without this the import itself fails on a bare
      # ubuntu runner.
      - name: Install system libs for OpenCV/MediaPipe
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (flake8)
        run: flake8 .

      - name: Format check (black)
        run: black --check .

      - name: Run tests
        run: PYTHONPATH=. pytest -v tests/
